  <circle cx="33" cy="42" r="3.5" fill="#10B981"/>
  <polyline points="31,42 33,44.5 36,40" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="41" y="40" width="24" height="4" rx="2" fill="#DBEAFE"/>

  <!-- Line 2 -->
  <circle cx="33" cy="54" r="3.5" fill="#10B981"/>
  <polyline points="31,54 33,56.5 36,52" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="41" y="52" width="20" height="4" rx="2" fill="#DBEAFE"/>

  <!-- Line 3 -->
  <circle cx="33" cy="66" r="3.5" fill="#CBD5E1"/>
  <rect x="41" y="64" width="22" height="4" rx="2" fill="#E2E8F0"/>

  <!-- Line 4 -->
  <circle cx="33" cy="76" r="3.5" fill="#CBD5E1"/>
