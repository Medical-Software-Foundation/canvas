<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect x="4" y="4" width="92" height="92" rx="18" ry="18" fill="#2563EB"/>

  <!-- Clipboard body -->
  <rect x="22" y="20" width="56" height="62" rx="6" ry="6" fill="#FFFFFF"/>

  <!-- Clipboard top clip -->
  <rect x="38" y="14" width="24" height="14" rx="4" ry="4" fill="#1D4ED8"/>
  <rect x="42" y="18" width="16" height="6" rx="3" ry="3" fill="#DBEAFE"/>

  <!-- Horizontal lines (checklist items) -->
