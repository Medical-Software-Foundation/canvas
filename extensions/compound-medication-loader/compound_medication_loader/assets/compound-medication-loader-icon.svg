<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Upload arrow above flask, pointing down into the opening -->
  <line x1="50" y1="8" x2="50" y2="30" stroke="#01A4FF" stroke-width="6" stroke-linecap="round"/>
  <polyline points="42,22 50,30 58,22" stroke="#01A4FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Erlenmeyer flask body -->
  <path d="M40 38 L40 48 L24 82 Q22 88 28 88 L72 88 Q78 88 76 82 L60 48 L60 38"
        stroke="#01A4FF" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- Liquid in the bottom of the flask -->
