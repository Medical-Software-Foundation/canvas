name: ACE (Adverse Childhood Experiences)
form_type: QUES
code_system: LOINC
code: "62378-5"
can_originate_in_charting: true
display_results_in_social_history_section: true
prologue: >
  Prior to your 18th birthday, please answer the following questions about
  events that happened during your childhood. This information will help your
  provider better understand your health history.
questions:
  - content: "Did a parent or other adult in the household often or very often swear at you, insult you, put you down, or humiliate you? Or act in a way that made you afraid that you might be physically hurt?"
    code_system: LOINC
    code: "62379-3"
    code_description: "Emotional abuse"
    responses_code_system: LOINC
    responses_type: SING
    display_result_in_social_history_section: false
    responses:
      - name: "Yes"
        code: "LA33-6"
        code_description: "Yes"
        value: "1"
      - name: "No"
        code: "LA32-8"
        code_description: "No"
        value: "0"

  - content: "Did a parent or other adult in the household often or very often push, grab, slap, or throw something at you? Or ever hit you so hard that you had marks or were injured?"
    code_system: LOINC
    code: "62380-1"
    code_description: "Physical abuse"
    responses_code_system: LOINC
    responses_type: SING
    display_result_in_social_history_section: false
    responses:
      - name: "Yes"
        code: "LA33-6"
        code_description: ""
        value: "1"
      - name: "No"
        code: "LA32-8"
        code_description: ""
        value: "0"

  - content: "Did an adult or person at least 5 years older than you ever touch or fondle you or have you touch their body in a sexual way? Or attempt or actually have oral, anal, or vaginal intercourse with you?"
    code_system: LOINC
    code: "62381-9"
    code_description: "Sexual abuse"
    responses_code_system: LOINC
    responses_type: SING
    display_result_in_social_history_section: false
