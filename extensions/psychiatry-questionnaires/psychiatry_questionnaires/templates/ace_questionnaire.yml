        code_description: ""
        value: "1"
      - name: "No"
        code: "LA32-8"
        code_description: ""
        value: "0"

  - content: "Did you often or very often feel that no one in your family loved you or thought you were important or special? Or your family didn't look out for each other, feel close to each other, or support each other?"
    code_system: LOINC
    code: "62382-7"
    code_description: "Emotional neglect"
    responses_code_system: LOINC
    responses_type: SING
    display_result_in_social_history_section: false
