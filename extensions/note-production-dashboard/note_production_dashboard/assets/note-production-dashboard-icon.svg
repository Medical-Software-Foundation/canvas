<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a6fa8"/>

  <!-- Clipboard body -->
  <rect x="22" y="28" width="56" height="58" rx="4" fill="#ffffff"/>

  <!-- Clipboard clip -->
  <rect x="38" y="22" width="24" height="10" rx="3" fill="#0d4f7c"/>
  <rect x="43" y="20" width="14" height="6" rx="3" fill="#1a6fa8"/>

