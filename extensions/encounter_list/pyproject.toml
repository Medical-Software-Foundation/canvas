# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "encounter-list"
version = "0.0.0"
description = "The Encounter List plugin provides a comprehensive worklist view of open encounters."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "arrow>=1.3.0",
    "django>=4.2.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.coverage.run]
omit = ["tests/*"]
