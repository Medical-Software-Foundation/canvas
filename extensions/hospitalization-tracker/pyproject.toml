# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "hospitalization-tracker"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
]

[dependency-groups]
dev = [
    "factory-boy>=3.3.0",
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-canvas>=0.1.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
python_files = ["test_*.py", "*_tests.py", "tests.py"]
markers = ["integtest: marks tests that use the real database"]

[tool.coverage.run]
omit = ["tests/*"]
