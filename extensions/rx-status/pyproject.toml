# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
authors = [
  {email = "engineering@vicert.com", name = "Vicert Team"}
]
name = "rx-status"
version = "0.0.2"
description = "Dashboard showing active prescriptions and e-prescribing statuses across all patients, with notification rules for status changes and duration thresholds."
readme = "README.md"
license = "MIT"
requires-python = ">=3.12,<3.14"
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]>=0.111.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
python_files = ["test_*.py"]
testpaths = ["tests"]

[tool.coverage.run]
omit = ["tests/*"]
