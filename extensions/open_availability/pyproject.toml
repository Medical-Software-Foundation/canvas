# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
authors = [
  {name = "Jess Herbert", email = "jessica.herbert@canvasmedical.com"}
]
name = "open-availability"
version = "0.0.3"
requires-python = ">=3.12"
license = "MIT"
readme = "README.md"
description = "Automatically creates open availability calendars for eligible providers when activated."
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.coverage.run]
omit = ["tests/*"]
