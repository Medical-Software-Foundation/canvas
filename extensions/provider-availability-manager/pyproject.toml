[project]
authors = [
  {email = "engineering@canvasmedical.com", name = "Canvas Team"}
]
dependencies = [
  "canvas[test-utils]"
]
description = "Drag-and-schedule provider availability manager that filters slots in the native Canvas appointment book."
license = "MIT"
name = "provider_availability_manager"
readme = "provider_availability_manager/README.md"
requires-python = ">=3.11"
version = "0.1.1"

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
]
