<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOAP Note</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic&subset=latin&v={{ cache_bust }}" rel="stylesheet">
    <style>
        :root {
            --color-primary: #22BA45;
            --color-secondary: #2185D0;
            --color-danger: #BD0B00;
            --color-warning: #ED4A0B;
            --color-text: rgba(0, 0, 0, 0.87);
            --color-text-muted: #767676;
            --color-bg: #F5F5F5;
            --color-surface: #FFFFFF;
            --color-border: rgba(34, 36, 38, 0.15);
            --font-family: lato, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --radius: .28571429rem;
            --shadow: 0 1px 2px 0 rgba(34, 36, 38, 0.15);
            --space-mini: 4px;
            --space-tiny: 8px;
            --space-small: 12px;
            --space-medium: 16px;
            --space-large: 20px;
            --space-huge: 24px;
            --transition-fast: 200ms;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.4285em;
            background: var(--color-surface);
            color: var(--color-text);
            padding: var(--space-large);
        }

        /* ── Header ──────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-medium);
            padding-bottom: var(--space-small);
            border-bottom: 1px solid var(--color-border);
        }

        .header h1 {
            font-size: 1.28571429rem;
            font-weight: 700;
            line-height: 1.28571429em;
            margin: 0;
        }

        .header-right { display: flex; align-items: center; gap: var(--space-small); }

        .status {
            font-size: .92857143em;
            color: var(--color-text-muted);
            transition: color var(--transition-fast);
        }
        .status.saved { color: var(--color-primary); }
        .status.saving { color: var(--color-warning); }
        .status.error { color: var(--color-danger); }

        /* ── Sections ────────────────────────────────────── */
        .sections { display: flex; flex-direction: column; gap: var(--space-medium); }

        .section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: var(--space-medium);
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            align-items: baseline;
            gap: var(--space-tiny);
            margin-bottom: var(--space-small);
        }

        .section-label {
            font-size: .92857143em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--color-text);
        }

        .section-sublabel {
            font-size: .85em;
            color: var(--color-text-muted);
            margin-left: auto;
        }

        /* ── Buttons ─────────────────────────────────────── */
        .btn-save {
            display: inline-flex; align-items: center; justify-content: center;
            height: 36px; padding: 0 20px;
            font-family: var(--font-family);
            font-size: .92857143em; font-weight: 700;
            border-radius: var(--radius); cursor: pointer; border: none;
            background: var(--color-secondary);
            color: var(--color-surface);
            transition: background var(--transition-fast), opacity var(--transition-fast);
        }
        .btn-save:hover:not(:disabled) { background: #1a6fb5; }
        .btn-save:disabled { opacity: 0.45; cursor: not-allowed; }

        .btn-order {
            display: inline-flex; align-items: center; gap: var(--space-mini);
            height: 32px; padding: 0 var(--space-small);
            font-family: var(--font-family);
            font-size: .85em; font-weight: 700;
            background: var(--color-surface);
            color: var(--color-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius); cursor: pointer;
            transition: all var(--transition-fast);
        }
        .btn-order:hover:not(.added) {
            background: var(--color-bg);
            border-color: rgba(34, 36, 38, 0.35);
        }
        .btn-order.added {
            background: #dcfce7; color: #166534;
            border-color: #a7f3d0; cursor: default;
        }
        .btn-order.adding {
            opacity: 0.6; cursor: wait;
        }

        /* ── Textareas ───────────────────────────────────── */
        textarea {
            width: 100%; padding: var(--space-tiny) var(--space-small);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-family: var(--font-family);
            font-size: 14px; line-height: 1.4285em;
            color: var(--color-text);
            resize: vertical; outline: none;
            transition: border-color var(--transition-fast);
        }
        textarea:focus { border-color: #96c8da; }
        textarea::placeholder { color: var(--color-text-muted); }

        /* ── ROS checkboxes ──────────────────────────────── */
        .ros-grid {
            display: flex; flex-wrap: wrap;
            gap: var(--space-tiny); margin-bottom: var(--space-small);
        }

        .ros-item {
            display: flex; align-items: center; gap: 6px;
            font-size: .92857143em; color: var(--color-text);
            padding: var(--space-mini) var(--space-small);
            border-radius: var(--radius);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            cursor: pointer; user-select: none;
            transition: all var(--transition-fast);
        }
        .ros-item:hover { border-color: rgba(34, 36, 38, 0.35); }
        .ros-item:has(input:checked) {
            background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32;
        }

        .ros-system {
            margin-bottom: var(--space-tiny);
        }
        .ros-system-label {
            font-size: .85em; font-weight: 700;
            color: var(--color-text); margin-bottom: var(--space-mini);
        }
        /* ── Vitals grid ─────────────────────────────────── */
        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-tiny);
        }
        .vitals-field { display: flex; flex-direction: column; gap: 2px; }
        .vitals-label {
            font-size: .78em; font-weight: 700;
            color: var(--color-text-muted);
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .vitals-input {
            padding: var(--space-mini) var(--space-tiny);
            font-family: var(--font-family);
            font-size: .92857143em;
            border: 1px solid var(--color-border);
            border-radius: var(--radius); outline: none;
            color: var(--color-text);
            transition: border-color var(--transition-fast);
            -moz-appearance: textfield;
        }
        .vitals-input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .vitals-input:focus { border-color: #96c8da; }
        .vitals-input::placeholder { color: var(--color-text-muted); }

        /* ── Exam fields ─────────────────────────────────── */
        .exam-fields { display: flex; flex-direction: column; gap: var(--space-tiny); }

        .exam-field {
            display: flex; align-items: flex-start; gap: var(--space-tiny);
        }
        .exam-field-label {
            min-width: 110px; padding-top: 6px;
            font-size: .85em; font-weight: 700;
            color: var(--color-text);
        }
        .exam-field input {
            flex: 1; padding: var(--space-mini) var(--space-tiny);
            font-family: var(--font-family);
            font-size: .85em;
            border: 1px solid var(--color-border);
            border-radius: var(--radius); outline: none;
            color: var(--color-text);
            transition: border-color var(--transition-fast);
        }
        .exam-field input:focus { border-color: #96c8da; }
        .exam-field input::placeholder { color: var(--color-text-muted); }

        .ros-item input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: var(--color-primary); cursor: pointer;
        }

        /* ── Condition search ────────────────────────────── */
        .search-wrapper { position: relative; }

        .search-input {
            width: 100%; padding: var(--space-tiny) var(--space-small);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-family: var(--font-family);
            font-size: 14px; outline: none;
            transition: border-color var(--transition-fast);
        }
        .search-input:focus { border-color: #96c8da; }

        .search-results {
            position: absolute; top: calc(100% + 2px);
            left: 0; right: 0; z-index: 10;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            max-height: 200px; overflow-y: auto;
            box-shadow: 0 2px 8px rgba(34, 36, 38, 0.15);
            display: none;
        }
        .search-results.open { display: block; }

        .search-result-item {
            padding: var(--space-tiny) var(--space-small);
            cursor: pointer; font-size: .92857143em;
            border-bottom: 1px solid rgba(34, 36, 38, 0.06);
            transition: background var(--transition-fast);
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: rgba(0, 0, 0, 0.03); }
        .search-result-item .code {
            display: inline-block;
            font-weight: 700; color: var(--color-secondary);
            font-size: .85em; margin-right: var(--space-tiny);
        }

        /* ── Condition chips ─────────────────────────────── */
        .condition-chips {
            display: flex; flex-direction: column;
            gap: var(--space-tiny); margin-top: var(--space-small);
        }

        .condition-chip {
            display: flex; align-items: center; gap: var(--space-tiny);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: var(--space-tiny) var(--space-small);
            transition: border-color var(--transition-fast);
        }
        .condition-chip:hover { border-color: rgba(34, 36, 38, 0.35); }

        .chip-code {
            font-weight: 700; color: var(--color-secondary);
            font-size: .85em; white-space: nowrap;
        }
        .chip-text {
            font-size: .92857143em; color: var(--color-text); font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 220px;
        }
        .chip-select {
            border: 1px solid var(--color-border); border-radius: var(--radius);
            padding: 2px 6px; font-size: .85em;
            font-family: var(--font-family);
            background: var(--color-surface); color: var(--color-text);
            cursor: pointer;
        }
        .chip-input {
            flex: 1;
            border: 1px solid var(--color-border); border-radius: var(--radius);
            padding: var(--space-mini) var(--space-tiny);
            font-family: var(--font-family);
            font-size: .85em; min-width: 100px; outline: none;
            transition: border-color var(--transition-fast);
        }
        .chip-input:focus { border-color: #96c8da; }
        .chip-input::placeholder { color: var(--color-text-muted); }

        .chip-remove {
            background: none; border: none; cursor: pointer;
            color: var(--color-text-muted); font-size: 18px;
            line-height: 1; transition: color var(--transition-fast);
        }
        .chip-remove:hover { color: var(--color-danger); }

        /* ── Existing conditions ─────────────────────────── */
        .existing-label {
            font-size: .78em; font-weight: 700;
            color: var(--color-text-muted);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-top: var(--space-small); margin-bottom: var(--space-mini);
        }
        .existing-conditions { display: flex; flex-wrap: wrap; gap: var(--space-mini); }

        .existing-cond-btn {
            background: #e8f4fd; color: var(--color-secondary);
            border: 1px solid #b9dbf4; border-radius: var(--radius);
            padding: var(--space-mini) var(--space-tiny);
            font-family: var(--font-family);
            font-size: .78em; font-weight: 700;
            cursor: pointer; transition: all var(--transition-fast);
        }
        .existing-cond-btn:hover {
            background: #d0e8f8; border-color: #85c1e9;
        }

        /* ── Order buttons row ───────────────────────────── */
        .order-buttons {
            display: flex; gap: var(--space-tiny);
            margin-top: var(--space-small); flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SOAP Note</h1>
        <div class="header-right">
            <span id="status" class="status"></span>
            <button id="save-btn" class="btn-save" onclick="saveAll()">Save &amp; Chart</button>
        </div>
    </div>

    <div class="sections">
        <div class="section">
            <div class="section-header">
                <div class="section-label">Reason for Visit</div>
            </div>
            <input type="text" id="rfv" class="search-input" placeholder="e.g., Follow-up, Annual physical, Sore throat..." />
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-label">Subjective</div>
                <div class="section-sublabel">History of Present Illness</div>
            </div>
            <textarea id="subjective" rows="4" placeholder="Chief complaint, HPI, patient-reported symptoms..."></textarea>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-label">Objective</div>
                <div class="section-sublabel">Vitals</div>
            </div>
            <div class="vitals-grid">
                <div class="vitals-field">
                    <label class="vitals-label">BP Systolic</label>
                    <input type="number" id="v-systolic" class="vitals-input" placeholder="mmHg" min="30" max="305" />
                </div>
                <div class="vitals-field">
                    <label class="vitals-label">BP Diastolic</label>
                    <input type="number" id="v-diastolic" class="vitals-input" placeholder="mmHg" min="20" max="180" />
                </div>
                <div class="vitals-field">
                    <label class="vitals-label">Pulse</label>
                    <input type="number" id="v-pulse" class="vitals-input" placeholder="bpm" min="30" max="250" />
                </div>
                <div class="vitals-field">
                    <label class="vitals-label">Temp</label>
                    <input type="number" id="v-temperature" class="vitals-input" placeholder="°F" min="85" max="107" step="0.1" />
                </div>
                <div class="vitals-field">
                    <label class="vitals-label">Resp Rate</label>
                    <input type="number" id="v-respiration" class="vitals-input" placeholder="/min" min="6" max="60" />
                </div>
                <div class="vitals-field">
                    <label class="vitals-label">SpO2</label>
                    <input type="number" id="v-oxygen" class="vitals-input" placeholder="%" min="60" max="100" />
                </div>
                <div class="vitals-field">
                    <label class="vitals-label">Height</label>
                    <input type="number" id="v-height" class="vitals-input" placeholder="in" min="10" max="108" />
                </div>
                <div class="vitals-field">
                    <label class="vitals-label">Weight</label>
                    <input type="number" id="v-weight" class="vitals-input" placeholder="lbs" min="1" max="1500" />
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-label">Objective</div>
                <div class="section-sublabel">Review of Systems</div>
            </div>
            <div id="ros-container"><em style="color:var(--color-text-muted);font-size:.85em">Loading ROS...</em></div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-label">Objective</div>
                <div class="section-sublabel">Physical Exam</div>
            </div>
            <div id="exam-container"><em style="color:var(--color-text-muted);font-size:.85em">Loading exam...</em></div>
            <textarea id="objective" rows="2" style="margin-top:var(--space-small)" placeholder="Additional exam findings..."></textarea>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-label">Assessment</div>
                <div class="section-sublabel">Diagnoses &amp; Conditions</div>
            </div>
            <div class="search-wrapper">
                <input type="text" class="search-input" id="dx-search"
                       placeholder="Search ICD-10 diagnoses..." autocomplete="off" />
                <div class="search-results" id="dx-results"></div>
            </div>
            <div class="condition-chips" id="condition-chips"></div>
            <div id="existing-section" style="display:none">
                <div class="existing-label">Patient's Active Conditions</div>
                <div class="existing-conditions" id="existing-conditions"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-label">Plan</div>
                <div class="section-sublabel">Treatment &amp; Orders</div>
            </div>
            <textarea id="plan" rows="4" placeholder="Treatment plan, medications, follow-up, referrals, patient education..."></textarea>
            <div class="order-buttons">
                <button class="btn-order" id="order-lab" onclick="originateOrder('lab', this)">+ Lab Order</button>
                <button class="btn-order" id="order-imaging" onclick="originateOrder('imaging', this)">+ Imaging</button>
                <button class="btn-order" id="order-refer" onclick="originateOrder('refer', this)">+ Referral</button>
                <button class="btn-order" id="order-prescribe" onclick="originateOrder('prescribe', this)">+ Rx</button>
            </div>
        </div>
    </div>

    <script>
        const NOTE_ID = {{ note_id_json|safe }};
        const PATIENT_ID = {{ patient_id_json|safe }};
        const BASE = "/plugin-io/api/soap_note/soap";
        const initial = {{ sections_json|safe }};

        const statusEl = document.getElementById("status");
        let saving = false;
        let addedConditions = [];

        let rosQuestions = [];

        document.getElementById("subjective").value = initial.subjective || "";
        document.getElementById("objective").value = initial.objective || "";
        document.getElementById("plan").value = initial.plan || "";

        try {
            const saved = JSON.parse(initial.assessment || "[]");
            if (Array.isArray(saved)) {
                saved.forEach(c => addConditionChip(c.icd10_code, c.display || c.icd10_text, c.condition_id, c.narrative, c.status));
            }
        } catch (_) {}

        loadPatientConditions();
        loadROSQuestions();
        loadExamQuestions();

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = "status " + (cls || "");
        }

        // ── ROS Loading ───────────────────────────────────────────
        async function loadROSQuestions() {
            const container = document.getElementById("ros-container");
            try {
                const resp = await fetch(`${BASE}/ros-questions`);
                const data = await resp.json();
                rosQuestions = data.questions || [];
                if (!rosQuestions.length) {
                    container.innerHTML = '<em style="color:var(--color-text-muted);font-size:.85em">No ROS questionnaire available</em>';
                    return;
                }
                container.innerHTML = rosQuestions.map(q =>
                    `<div class="ros-system">
                        <div class="ros-system-label">${esc(q.content)}</div>
                        <div class="ros-grid">${q.responses.map(r =>
                            `<label class="ros-item">
                                <input type="checkbox" name="ros" data-system="${esc(q.content)}" value="${esc(r.value)}" />
                                ${esc(r.name)}
                            </label>`
                        ).join("")}</div>
                    </div>`
                ).join("");
            } catch (e) {
                container.innerHTML = '<em style="color:var(--color-danger);font-size:.85em">Failed to load ROS</em>';
                console.error("ROS load error:", e);
            }
        }

        // ── Exam Loading ──────────────────────────────────────────
        async function loadExamQuestions() {
            const container = document.getElementById("exam-container");
            try {
                const resp = await fetch(`${BASE}/exam-questions`);
                const data = await resp.json();
                const questions = data.questions || [];
                if (!questions.length) {
                    container.innerHTML = '<em style="color:var(--color-text-muted);font-size:.85em">No exam questionnaire available</em>';
                    return;
                }
                container.innerHTML = '<div class="exam-fields">' + questions.map(q =>
                    `<div class="exam-field">
                        <label class="exam-field-label">${esc(q.content)}</label>
                        <input type="text" name="exam" data-system="${esc(q.content)}"
                               value="${escA(q.default_value)}"
                               placeholder="Findings..." />
                    </div>`
                ).join("") + '</div>';
            } catch (e) {
                container.innerHTML = '<em style="color:var(--color-danger);font-size:.85em">Failed to load exam</em>';
                console.error("Exam load error:", e);
            }
        }

        let searchTimeout;
        const dxSearch = document.getElementById("dx-search");
        const dxResults = document.getElementById("dx-results");

        dxSearch.addEventListener("input", () => {
            clearTimeout(searchTimeout);
            const q = dxSearch.value.trim();
            if (q.length < 2) { dxResults.classList.remove("open"); return; }
            searchTimeout = setTimeout(() => searchConditions(q), 300);
        });
        dxSearch.addEventListener("blur", () => {
            setTimeout(() => dxResults.classList.remove("open"), 200);
        });

        async function searchConditions(query) {
            try {
                const resp = await fetch(`${BASE}/search-conditions?q=${encodeURIComponent(query)}`);
                const data = await resp.json();
                renderSearchResults(data.results || []);
            } catch (e) { console.error("Search error:", e); }
        }

        function renderSearchResults(results) {
            if (!results.length) { dxResults.classList.remove("open"); return; }
            dxResults.innerHTML = results.map(r =>
                `<div class="search-result-item" onmousedown="selectCondition('${escA(r.icd10_code)}', '${escA(r.icd10_text)}')">
                    <span class="code">${fmt(esc(r.icd10_code))}</span>${esc(r.icd10_text)}
                </div>`
            ).join("");
            dxResults.classList.add("open");
        }

        function selectCondition(code, text) {
            if (addedConditions.some(c => c.icd10_code === code)) return;
            addConditionChip(code, text, null, "", "stable");
            dxSearch.value = "";
            dxResults.classList.remove("open");
        }

        function addConditionChip(code, text, conditionId, narrative, status) {
            addedConditions.push({ icd10_code: code, display: text, condition_id: conditionId, narrative: narrative || "", status: status || "stable" });
            renderChips();
        }

        function removeCondition(index) {
            addedConditions.splice(index, 1);
            renderChips();
        }

        function renderChips() {
            const el = document.getElementById("condition-chips");
            el.innerHTML = addedConditions.map((c, i) => {
                const isExisting = !!c.condition_id;
                if (isExisting) {
                    // Assess — status + narrative
                    return `<div class="condition-chip">
                        <span class="chip-code">${fmt(c.icd10_code)}</span>
                        <span class="chip-text">${esc(c.display)}</span>
                        <select class="chip-select" onchange="addedConditions[${i}].status=this.value">
                            <option value="improved" ${c.status==='improved'?'selected':''}>Improved</option>
                            <option value="stable" ${c.status==='stable'?'selected':''}>Stable</option>
                            <option value="deteriorated" ${c.status==='deteriorated'?'selected':''}>Deteriorated</option>
                        </select>
                        <input class="chip-input" placeholder="Narrative..." value="${escA(c.narrative)}"
                               oninput="addedConditions[${i}].narrative=this.value" />
                        <button class="chip-remove" onclick="removeCondition(${i})">&times;</button>
                    </div>`;
                } else {
                    // Diagnose — today's assessment
                    return `<div class="condition-chip" style="border-left: 3px solid var(--color-primary)">
                        <span class="chip-code">${fmt(c.icd10_code)}</span>
                        <span class="chip-text">${esc(c.display)}</span>
                        <span style="font-size:.78em;font-weight:700;color:var(--color-primary);white-space:nowrap">NEW</span>
                        <input class="chip-input" placeholder="Today's assessment..." value="${escA(c.narrative)}"
                               oninput="addedConditions[${i}].narrative=this.value" />
                        <button class="chip-remove" onclick="removeCondition(${i})">&times;</button>
                    </div>`;
                }
            }).join("");
        }

        async function loadPatientConditions() {
            try {
                const resp = await fetch(`${BASE}/patient-conditions?patient_id=${PATIENT_ID}`);
                const data = await resp.json();
                const conds = data.conditions || [];
                if (!conds.length) return;
                document.getElementById("existing-section").style.display = "block";
                document.getElementById("existing-conditions").innerHTML = conds.map(c =>
                    `<button class="existing-cond-btn" onclick="selectExisting('${escA(c.condition_id)}','${escA(c.icd10_code)}','${escA(c.display)}')">
                        ${fmt(esc(c.icd10_code))} ${esc(c.display)}
                    </button>`
                ).join("");
            } catch (_) {}
        }

        function selectExisting(condId, code, text) {
            if (addedConditions.some(c => c.icd10_code === code)) return;
            addConditionChip(code, text, condId, "", "stable");
        }

        const orderCounts = {};

        async function originateOrder(type, btn) {
            if (btn.classList.contains('adding')) return;
            const origLabel = btn.textContent;
            btn.classList.add('adding');
            btn.textContent = 'Adding...';

            try {
                const resp = await fetch(`${BASE}/originate-order`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ note_uuid: NOTE_ID, order_type: type }),
                });
                if (!resp.ok) throw new Error("Failed");

                orderCounts[type] = (orderCounts[type] || 0) + 1;
                const count = orderCounts[type];
                const labels = { lab: 'Lab Order', imaging: 'Imaging', refer: 'Referral', prescribe: 'Rx' };
                btn.classList.remove('adding');
                btn.classList.add('added');
                btn.textContent = '\u2713 ' + labels[type] + (count > 1 ? ' (' + count + ')' : '');

                setStatus("Order added to note", "saved");
                setTimeout(() => setStatus(""), 2000);

                // Allow clicking again to add another of the same type
                setTimeout(() => {
                    btn.classList.remove('added');
                    btn.textContent = '+ ' + labels[type];
                }, 3000);
            } catch (e) {
                btn.classList.remove('adding');
                btn.textContent = origLabel;
                setStatus("Order failed", "error");
                console.error(e);
            }
        }

        async function saveAll() {
            if (saving) return;
            saving = true;
            document.getElementById("save-btn").disabled = true;
            setStatus("Saving & charting...", "saving");

            // Collect ROS selections grouped by system
            const rosSelections = {};
            document.querySelectorAll('input[name="ros"]:checked').forEach(cb => {
                const system = cb.dataset.system || "other";
                if (!rosSelections[system]) rosSelections[system] = [];
                rosSelections[system].push(cb.value);
            });

            // Collect exam findings
            const examFindings = {};
            document.querySelectorAll('input[name="exam"]').forEach(inp => {
                examFindings[inp.dataset.system] = inp.value;
            });

            // Collect vitals
            const vitals = {};
            ['systolic','diastolic','pulse','temperature','respiration','oxygen','height','weight'].forEach(k => {
                const v = document.getElementById('v-' + k)?.value;
                if (v) vitals[k] = v;
            });

            const objectiveText = document.getElementById("objective").value.trim();

            try {
                const resp = await fetch(`${BASE}/save-commands`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        note_uuid: NOTE_ID, patient_id: PATIENT_ID,
                        rfv: document.getElementById("rfv").value.trim(),
                        subjective: document.getElementById("subjective").value.trim(),
                        objective: objectiveText,
                        vitals: vitals,
                        ros_selections: rosSelections,
                        exam_findings: examFindings,
                        conditions: addedConditions,
                        plan: document.getElementById("plan").value.trim(),
                    }),
                });
                if (!resp.ok) throw new Error(`Save failed: ${resp.status}`);
                const result = await resp.json();
                setStatus(`Saved — ${result.count} commands`, "saved");
                setTimeout(() => setStatus(""), 3000);
            } catch (e) { setStatus("Save failed", "error"); console.error(e); }
            finally { saving = false; document.getElementById("save-btn").disabled = false; }
        }

        document.addEventListener("keydown", (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === "s") { e.preventDefault(); saveAll(); }
        });

        function fmt(code) { return (!code || code.length <= 3) ? code : code.substring(0,3) + "." + code.substring(3); }
        function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
        function escA(s) { return (s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

        let messagePort = null;
        window.addEventListener("message", (event) => {
            if (event.data?.type === "INIT_CHANNEL" && event.ports?.[0]) {
                messagePort = event.ports[0];
                messagePort.start();
                messagePort.postMessage({ type: "RESIZE", height: 1100 });
            }
        });
    </script>
</body>
</html>
