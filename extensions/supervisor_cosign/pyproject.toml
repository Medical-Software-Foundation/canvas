[project]
name = "supervisor-cosign"
version = "0.6.0"
description = "Supervisor co-signature workflow. Reads Canvas's native Staff.default_supervising_provider; when a supervisee's note locks, creates a co-sign task for the supervisor and exposes a Co-sign button with approve + addendum."
authors = [
    {name = "Rebecca Portela", email = "rebecca.portela@canvasmedical.com"},
]
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "canvas[test-utils]",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v"

[tool.coverage.run]
source = ["supervisor_cosign"]
omit = ["tests/*", "*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
