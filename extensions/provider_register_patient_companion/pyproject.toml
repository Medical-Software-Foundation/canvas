[project]
authors = [
  {email = "engineering@canvasmedical.com", name = "Canvas Team"}
]
dependencies = [
  "canvas[test-utils]"
]
description = "Provider companion app for registering a new patient from the global companion surface, with duplicate detection on similar name + DOB and matching phone number."
license = "MIT"
name = "provider_register_patient_companion"
readme = "provider_register_patient_companion/README.md"
requires-python = ">=3.11"
version = "0.0.1"

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
]

[tool.coverage.run]
source = ["provider_register_patient_companion"]
omit = ["tests/*", "*/tests/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
