[project]
authors = [
  {name = "Allison Leitner", email = "allison.leitner@canvasmedical.com"}
]
dependencies = [
  "canvas[test-utils]"
]
description = "Cardiology vitals dashboard tab — orthostatic BP, dry/current weight, urine output, trend charts, audit log."
license = "MIT"
name = "vitals-dashboard"
readme = "README.md"
requires-python = ">=3.11"
version = "0.1.0"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["vitals_dashboard"]
omit = ["tests/*", "*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[dependency-groups]
dev = [
    "pytest-cov>=7.1.0",
]
