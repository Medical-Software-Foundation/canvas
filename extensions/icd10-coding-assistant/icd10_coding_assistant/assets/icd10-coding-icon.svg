  <circle cx="50" cy="50" r="46" fill="#0066cc" />
  <!-- Document/chart shape -->
  <rect x="28" y="20" width="44" height="52" rx="4" fill="white" />
  <!-- Document fold corner -->
  <polygon points="58,20 72,34 58,34" fill="#b3d1f5" />
  <!-- Code lines representing ICD codes -->
  <rect x="34" y="36" width="20" height="4" rx="2" fill="#0066cc" />
  <rect x="34" y="44" width="28" height="4" rx="2" fill="#b3d1f5" />
  <rect x="34" y="52" width="24" height="4" rx="2" fill="#b3d1f5" />
  <!-- Green checkmark badge (bottom right) -->
  <circle cx="68" cy="72" r="14" fill="#28a745" />
  <polyline points="60,72 65,78 76,65" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
