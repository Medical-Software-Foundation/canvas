[project]
authors = [
  {email = "engineering@canvasmedical.com", name = "Canvas Team"}
]
dependencies = [
  "canvas[test-utils]"
]
description = "Provider companion app (patient scope) rendering a live, read-only clinical summary — social determinants, conditions, medications, allergies, vitals, immunizations, surgical history — with WebSocket-driven refresh on domain events."
license = "MIT"
name = "provider_clinical_summary_companion"
readme = "provider_clinical_summary_companion/README.md"
requires-python = ">=3.11"
version = "0.0.1"

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
]

[tool.coverage.run]
source = ["provider_clinical_summary_companion"]
omit = ["tests/*", "*/tests/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
