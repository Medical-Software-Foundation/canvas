# Local development and testing only. The Canvas plugin runner does not use this file.

[project]
name = "portal-content"
version = "0.0.0"
description = "Patient portal: My Records (visit summaries with After Visit Summary, lab and imaging reports, letters) and My Profile (information and insurance on file)."
license = "MIT"
readme = "portal_content/README.md"
authors = [{ name = "Jess Herbert", email = "jessica.herbert@canvasmedical.com" }]
requires-python = ">=3.12"
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]

[tool.coverage.run]
branch = true
source = ["portal_content"]
omit = ["tests/*"]
