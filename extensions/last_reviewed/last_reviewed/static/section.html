<div class="chart-section">
  <div class="chart-section-header">
    <div class="ui small header" style="margin-bottom: 0.8em;">
      <span class="icon">
        <span class="CanvasIcon CanvasIcon--color--inherit CanvasIcon--size--large">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="8" width="30" height="34" rx="3"/>
            <rect x="18" y="4" width="12" height="6" rx="1.5" fill="currentColor"/>
            <path d="M16 24 l5 5 l11 -11"/>
            <path d="M16 36 h12"/>
          </svg>
        </span>
      </span>
      <div class="content">Last Reviewed</div>
    </div>
  </div>
  <div role="list" class="ui selection middle aligned list">
    {% for row in rows %}
    <div role="listitem" class="item">
      <div class="content">
        <div class="header">{{ row.label }}</div>
        <div class="description">
          {% if row.reviewed %}
            <span title="{{ row.absolute }}">{{ row.relative }}</span>
            {% if row.reviewer %} &middot; by {{ row.reviewer }}{% endif %}
          {% else %}
            <em>Never reviewed</em>
          {% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
