# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "practitioner-bulk-loader"
version = "0.1.90"
description = "Bulk-load practitioners from a CSV file: validates records, detects duplicates, and creates or additively merges FHIR Practitioner resources."
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]
DJANGO_SETTINGS_MODULE = "canvas_sdk.tests.settings"

[tool.coverage.run]
source = ["practitioner_bulk_loader"]
omit = ["tests/*", "*/tests/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
