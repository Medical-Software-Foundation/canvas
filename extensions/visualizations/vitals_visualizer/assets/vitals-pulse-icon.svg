  <!-- EKG / pulse line -->
  <path d="M14 64 L32 64 L36 64 L40 60 L43 64 L47 64 L51 68 L54 48 L58 78 L61 60 L65 64 L82 64"
        fill="none" stroke="#dc2626" stroke-width="2.8"
