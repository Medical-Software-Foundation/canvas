<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Card shadow -->
  <rect x="13" y="23" width="74" height="66" rx="10" fill="#6b1313" opacity="0.4"/>

  <!-- Card body -->
  <rect x="11" y="20" width="74" height="66" rx="10" fill="#fafcff"/>

  <!-- Top band (red accent) with rounded top corners only -->
