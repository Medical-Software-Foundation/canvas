# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "patient-csv-loader"
version = "0.0.0"
requires-python = ">=3.12"
authors = [{name = "Jess Herbert", email = "jessica@canvasmedical.com"}]
license = "MIT"
readme = "README.md"
description = "Bulk-load patient demographic data from CSV files with validation, preview, and confirmation."
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.coverage.run]
omit = ["tests/*"]
