[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voice-dictation"
version = "0.0.1"
description = "Voice dictation plugin for Canvas — ElevenLabs STT for HPI and Plan commands"
license = "MIT"
requires-python = ">=3.11,<3.13"
dependencies = ["canvas>=0.1.4"]

[tool.hatch.build.targets.wheel]
packages = ["voice_dictation"]

[tool.pytest.ini_options]
pythonpath = ["."]
