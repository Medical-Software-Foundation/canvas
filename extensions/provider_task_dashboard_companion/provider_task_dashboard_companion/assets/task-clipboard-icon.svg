<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Clipboard shadow -->
  <rect x="18" y="22" width="64" height="72" rx="7" fill="#7a3e0e" opacity="0.35"/>

  <!-- Clipboard body (warm amber) -->
  <rect x="16" y="20" width="64" height="72" rx="7" fill="#d97706"/>

  <!-- Inner bevel highlight for paper-cut depth -->
  <rect x="18" y="22" width="60" height="68" rx="5" fill="#f59e0b"/>

  <!-- Paper sheet -->
  <rect x="23" y="30" width="50" height="56" rx="3" fill="#fffaf0"/>

  <!-- Metal clip (back plate) -->
  <rect x="36" y="12" width="28" height="16" rx="3" fill="#6b7684"/>
  <!-- Clip front face (lighter) -->
  <rect x="38" y="14" width="24" height="10" rx="2" fill="#94a3b8"/>
  <!-- Clip inner slot -->
  <rect x="44" y="17" width="12" height="3" rx="1" fill="#475569"/>

  <!-- Checklist item 1: checked (filled amber box with white check) -->
  <rect x="30" y="40" width="9" height="9" rx="2" fill="#d97706"/>
  <path d="M32 44.5 L34.5 47 L37.5 42" stroke="#fffaf0" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="43" y="43" width="24" height="4" rx="1" fill="#e7dac1"/>

  <!-- Checklist item 2: unchecked -->
  <rect x="30" y="55" width="9" height="9" rx="2" fill="#fffaf0" stroke="#d97706" stroke-width="2"/>
  <rect x="43" y="58" width="24" height="4" rx="1" fill="#e7dac1"/>

  <!-- Checklist item 3: unchecked -->
  <rect x="30" y="70" width="9" height="9" rx="2" fill="#fffaf0" stroke="#d97706" stroke-width="2"/>
  <rect x="43" y="73" width="18" height="4" rx="1" fill="#e7dac1"/>
</svg>
