# Used for local development and testing only.
# The Canvas plugin packaging process does not use this file.

[project]
name = "vitalstream-plugin"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
    "arrow>=1.3.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
pythonpath = [".."]
testpaths = ["tests"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "*/tests/*",
    "static/*",
    "templates/*",
]

[tool.coverage.report]
omit = [
    "tests/*",
    "*/tests/*",
    "static/*",
    "templates/*",
]
