name: "STOP-BANG"
form_type: "QUES"
code_system: "INTERNAL"
code: "SLEEP_STOPBANG"
can_originate_in_charting: true
questions:
  - content: "Snoring: Do you snore loudly (louder than talking or loud enough to be heard through closed doors)?"
    code_system: "INTERNAL"
    code: "SLEEP_STOPBANG_S1"
    responses_type: "SING"
    responses_code_system: "INTERNAL"
    responses:
      - {name: "No", code: "SLEEP_STOPBANG_S1_0", value: "0"}
      - {name: "Yes", code: "SLEEP_STOPBANG_S1_1", value: "1"}
  - content: "Tiredness: Do you often feel tired, fatigued, or sleepy during the daytime?"
    code_system: "INTERNAL"
    code: "SLEEP_STOPBANG_S2"
    responses_type: "SING"
    responses_code_system: "INTERNAL"
    responses:
      - {name: "No", code: "SLEEP_STOPBANG_S2_0", value: "0"}
      - {name: "Yes", code: "SLEEP_STOPBANG_S2_1", value: "1"}
  - content: "Observed apnea: Has anyone observed you stop breathing during your sleep?"
    code_system: "INTERNAL"
    code: "SLEEP_STOPBANG_S3"
    responses_type: "SING"
    responses_code_system: "INTERNAL"
    responses:
      - {name: "No", code: "SLEEP_STOPBANG_S3_0", value: "0"}
      - {name: "Yes", code: "SLEEP_STOPBANG_S3_1", value: "1"}
  - content: "Pressure: Do you have, or are you being treated for, high blood pressure?"
    code_system: "INTERNAL"
    code: "SLEEP_STOPBANG_S4"
    responses_type: "SING"
    responses_code_system: "INTERNAL"
    responses:
      - {name: "No", code: "SLEEP_STOPBANG_S4_0", value: "0"}
      - {name: "Yes", code: "SLEEP_STOPBANG_S4_1", value: "1"}
  - content: "Neck circumference: Is your neck circumference greater than 40 cm (about 16 inches)?"
    code_system: "INTERNAL"
    code: "SLEEP_STOPBANG_NECK"
    responses_type: "SING"
    responses_code_system: "INTERNAL"
    responses:
      - {name: "No", code: "SLEEP_STOPBANG_NECK_0", value: "0"}
      - {name: "Yes", code: "SLEEP_STOPBANG_NECK_1", value: "1"}
