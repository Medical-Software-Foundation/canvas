[project]
name = "lab-order-validation"
version = "0.0.1"
description = "Pre-flight validation for lab orders bound for electronic transmission. Blocks Sign-and-Send if patient/coverage/payer data would fail downstream at Health Gorilla. No override."
authors = [{ name = "Jess Herbert", email = "jessica.herbert@canvasmedical.com" }]
license = "MIT"
readme = "README.md"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v"

[tool.coverage.run]
source = ["lab_order_validation"]
omit = ["tests/*", "*/tests/*", "*/__pycache__/*"]
branch = true

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
