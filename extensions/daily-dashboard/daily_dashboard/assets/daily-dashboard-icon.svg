<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Solid black rounded-square tile (Canvas drawer style) -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="#000000"/>
  <!-- White clipboard body -->
  <rect x="146" y="124" width="220" height="286" rx="26"
        fill="none" stroke="#FFFFFF" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- clip tab -->
  <rect x="222" y="98" width="68" height="46" rx="16" fill="#FFFFFF"/>
  <!-- checklist: two white checkmarks + two label bars -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="182,212 204,234 248,190"/>
    <polyline points="182,300 204,322 248,278"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="278" y="200" width="72" height="20" rx="10"/>
    <rect x="278" y="288" width="72" height="20" rx="10"/>
  </g>
</svg>
