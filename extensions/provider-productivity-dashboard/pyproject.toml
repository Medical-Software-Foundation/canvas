# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "provider-productivity-dashboard"
version = "0.0.0"
description = "A panel management dashboard showing practice-wide and provider-specific metrics: patients seen, CPT codes, note status, unsigned notes, care gaps, orders (labs, imaging, referrals, DME), medications prescribed, and average time to close notes."
requires-python = ">=3.12"
license = "MIT"
readme = "README.md"
authors = [
    { name = "Nora Greer", email = "nora.greer@canvasmedical.com" },
]
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
    "arrow",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.coverage.run]
omit = ["tests/*"]
