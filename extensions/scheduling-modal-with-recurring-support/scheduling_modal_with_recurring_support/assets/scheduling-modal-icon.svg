  <rect x="71" y="54" width="8" height="8" rx="2" fill="#2185D0"/>
  <rect x="26" y="68" width="8" height="8" rx="2" fill="#2185D0"/>
  <rect x="41" y="68" width="8" height="8" rx="2" fill="#2185D0"/>
  <rect x="56" y="68" width="8" height="8" rx="2" fill="#2185D0"/>
