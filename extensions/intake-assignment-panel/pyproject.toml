[project]
authors = [
  {email = "amanda.peterson@canvasmedical.com", name = "Amanda Peterson"},
]
description = "Dashboard of pending intake notes filtered by the logged-in provider's active state licenses"
license = "MIT"
name = "intake-assignment-panel"
readme = "README.md"
requires-python = ">=3.12"
version = "0.1.0"

[dependency-groups]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "canvas",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "*/tests/*", "*/__pycache__/*", ".venv/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
