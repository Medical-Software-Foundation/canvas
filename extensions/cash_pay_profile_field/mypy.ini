[mypy]
python_version = 3.12
ignore_missing_imports = True
exclude = (^|/)(\.venv|\.pytest_cache|tests)/

# canvas_sdk ships without a py.typed marker, so its modules are untyped.
# Silence the missing-stub noise; it is not a defect in plugin code.
[mypy-canvas_sdk.*]
ignore_missing_imports = True
follow_imports = skip
