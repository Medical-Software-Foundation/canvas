<!DOCTYPE html>
<html>
<head>
<style>
  .pathway-rec { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 12px 16px; color: #1a202c; }
  .pathway-rec h3 { margin: 0 0 10px; font-size: 16px; font-weight: 600; color: #2f855a; }
  .pathway-rec .source { color: #4a5568; font-size: 12px; margin-bottom: 8px; }
  .pathway-rec .body { white-space: pre-wrap; line-height: 1.5; }
</style>
</head>
<body>
  <div class="pathway-rec">
    <h3>Clinical Pathway Recommendation</h3>
    <div class="source">Source pathway: {{ pathway_title }}</div>
    <div class="body">{{ recommendation }}</div>
  </div>
</body>
</html>
