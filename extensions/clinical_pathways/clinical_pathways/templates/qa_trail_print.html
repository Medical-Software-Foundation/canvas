<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Arial, sans-serif; font-size: 11px; color: #000; }
  h3 { font-size: 13px; margin: 0 0 8px; }
  .segment { margin-bottom: 8px; }
  .segment-title { font-weight: bold; margin-bottom: 4px; }
  .item { margin: 2px 0; }
  .question { font-weight: bold; }
</style>
</head>
<body>
  <h3>Clinical Pathway Q&amp;A: {{ pathway_title }}</h3>
  {% for segment in segments %}
    <div class="segment">
      {% if segment.segment_title %}<div class="segment-title">{{ segment.segment_title }}</div>{% endif %}
      {% for item in segment.items %}
        <div class="item">
          <span class="question">{{ item.question }}:</span>
          {% if item.answer %}{{ item.answer }}{% else %}(no answer){% endif %}
        </div>
      {% endfor %}
    </div>
  {% endfor %}
</body>
</html>
