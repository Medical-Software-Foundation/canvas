<!DOCTYPE html>
<html>
<head>
<style>
  .pathway-qa { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 12px 16px; color: #1a202c; }
  .pathway-qa h3 { margin: 0 0 12px; font-size: 16px; font-weight: 600; }
  .pathway-qa .segment { margin-bottom: 14px; padding: 8px 12px; background: #f7fafc; border-left: 3px solid #4299e1; border-radius: 4px; }
  .pathway-qa .segment-title { font-weight: 600; margin-bottom: 6px; color: #2b6cb0; }
  .pathway-qa .item { margin: 4px 0; line-height: 1.4; }
  .pathway-qa .question { font-weight: 500; }
  .pathway-qa .answer { color: #2d3748; }
  .pathway-qa .answer.empty { color: #a0aec0; font-style: italic; }
</style>
</head>
<body>
  <div class="pathway-qa">
    <h3>Clinical Pathway Q&amp;A: {{ pathway_title }}</h3>
    {% for segment in segments %}
      <div class="segment">
        {% if segment.segment_title %}<div class="segment-title">{{ segment.segment_title }}</div>{% endif %}
        {% for item in segment.items %}
          <div class="item">
            <span class="question">{{ item.question }}</span> &mdash;
            <span class="answer{% if not item.answer %} empty{% endif %}">{% if item.answer %}{{ item.answer }}{% else %}(no answer){% endif %}</span>
          </div>
        {% endfor %}
      </div>
    {% endfor %}
  </div>
</body>
</html>
