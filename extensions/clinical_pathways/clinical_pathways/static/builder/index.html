<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pathway Builder</title>
  <link rel="stylesheet" href="{{ api_base }}/styles.css?v={{ cache_bust }}" />
</head>
<body data-api-base="{{ api_base }}">
  <header class="topbar">
    <h1>Pathway Builder</h1>
    <div class="topbar-right">
      <span id="save-status" class="save-status" role="status" aria-live="polite"></span>
      <button id="new-pathway-btn" class="primary">+ New pathway</button>
    </div>
  </header>

  <main id="app">
    <aside id="pathway-list" class="pane">
      <h2>Pathways</h2>
      <ul id="pathway-list-items" class="list"></ul>
    </aside>

    <section id="pathway-detail" class="pane wide">
      <div id="empty-state" class="empty">
        Pick a pathway from the list, or create a new one to begin.
      </div>

      <div id="pathway-editor" class="hidden">
        <header class="editor-header">
          <div class="header-fields">
            <label class="block">
              Pathway name
              <input type="text" id="pathway-title" />
            </label>
            <label class="block">
              Description (optional)
              <textarea id="pathway-description" rows="2"></textarea>
            </label>
          </div>
          <div class="header-actions">
            <span id="status-pill" class="status-pill"></span>
            <button type="button" id="publish-btn" class="primary">Publish</button>
            <button type="button" id="unpublish-btn" class="secondary hidden">Unpublish</button>
            <button type="button" id="delete-pathway-btn" class="danger">Delete</button>
          </div>
        </header>

        <section class="root-picker block">
          <h3>Starting questionnaire</h3>
          <p class="hint">The first questionnaire that will be auto-inserted into the note when this pathway is started.</p>
          <div id="root-picker-host"></div>
        </section>

        <section id="tree-host" class="tree-host"></section>

        <section id="validation-issues" class="validation hidden">
          <h3>Validation</h3>
          <ul id="validation-list"></ul>
        </section>
      </div>
    </section>
  </main>

  <script src="{{ api_base }}/main.js?v={{ cache_bust }}"></script>
</body>
</html>
