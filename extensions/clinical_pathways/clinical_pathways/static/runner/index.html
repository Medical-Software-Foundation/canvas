<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Clinical Pathways</title>
  <link rel="stylesheet" href="{{ api_base }}/styles.css?v={{ cache_bust }}" />
</head>
<body data-api-base="{{ api_base }}">
  <header class="topbar">
    <h1>Clinical Pathways</h1>
    <button id="restart-btn" class="secondary hidden">Restart</button>
  </header>

  <main id="app">
    <section id="search-view">
      <input id="search-input" type="text" placeholder="Search pathways by title…" autofocus />
      <ul id="results" class="list"></ul>
    </section>

    <section id="run-view" class="hidden">
      <div id="run-header">
        <h2 id="pathway-name"></h2>
      </div>
      <article id="segment-view"></article>
      <div class="row">
        <button id="next-btn" class="primary">Next</button>
      </div>
    </section>

    <section id="complete-view" class="hidden">
      <h2>Recommendation</h2>
      <div id="recommendation-text" class="recommendation"></div>
      <div class="row">
        <button id="commit-btn" class="primary">Commit to note</button>
      </div>
      <div id="commit-status" class="status"></div>
    </section>
  </main>

  <template id="question-template">
    <div class="question" data-question-dbid="">
      <label class="question-text"></label>
      <div class="input-wrap"></div>
    </div>
  </template>

  <script src="{{ api_base }}/main.js?v={{ cache_bust }}"></script>
</body>
</html>
