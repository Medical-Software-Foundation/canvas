[project]
name = "telehealth-disclaimer"
version = "0.0.3"
description = "Automatically inserts a telehealth disclaimer into the plan section of telehealth notes upon creation."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Allison Leitner", email = "allison.leitner@canvasmedical.com" },
]
dependencies = [
    "canvas[test-utils]",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["telehealth_disclaimer"]
omit = ["tests/*", "*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[dependency-groups]
dev = [
    "pytest-cov>=7.1.0",
]
