<!DOCTYPE html>
<html>
<head>
    <style>
        .telehealth-disclaimer {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 12px 16px;
            background: #f0f7ff;
            border-left: 4px solid #3182ce;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.5;
            color: #2d3748;
        }
        .telehealth-disclaimer strong {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #1a365d;
        }
    </style>
</head>
<body>
    <div class="telehealth-disclaimer">
        <strong>Telehealth Disclaimer</strong>
        {{ disclaimer_text }}
    </div>
</body>
</html>
