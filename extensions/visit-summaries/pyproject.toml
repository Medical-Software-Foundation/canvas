# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "visit-summaries"
version = "0.0.0"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
    "arrow",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "canvas_sdk.tests.settings"
python_files = ["tests/test_*.py"]
python_classes = ["Test"]
python_functions = ["test_*"]

[tool.coverage.run]
omit = ["tests/*"]
