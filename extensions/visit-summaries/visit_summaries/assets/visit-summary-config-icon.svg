  <!-- Horizontal lines representing text -->
  <rect x="35" y="36" width="30" height="3" rx="1.5" fill="#4f46e5" opacity="0.7"/>
  <rect x="35" y="44" width="22" height="3" rx="1.5" fill="#4f46e5" opacity="0.5"/>
  <rect x="35" y="52" width="26" height="3" rx="1.5" fill="#4f46e5" opacity="0.5"/>

  <!-- Sparkle / AI indicator in bottom-right -->
  <circle cx="64" cy="64" r="12" fill="#818cf8"/>
  <text x="64" y="68.5" text-anchor="middle" font-size="14" font-family="sans-serif" fill="white" font-weight="bold">✦</text>
