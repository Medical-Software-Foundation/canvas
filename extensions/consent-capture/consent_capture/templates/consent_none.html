<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Consent already on file</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
      --panel: #f9fafb;
      --primary: #111827;
      --primary-hover: #000000;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; background: #fff; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .view { height: 100%; display: flex; flex-direction: column; min-height: 0; }
    .info-body {
      flex: 1 1 auto; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 32px 40px;
    }
    .badge {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--ink); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 10px; }
    .lead { font-size: 15px; margin: 0 0 20px; color: var(--ink); max-width: 420px; }

    .note {
      display: flex; gap: 10px; text-align: left;
      background: var(--panel); border: 1px solid var(--line);
      color: var(--ink); border-radius: 10px;
      padding: 13px 15px; font-size: 14px; line-height: 1.55; max-width: 460px;
    }
    .note .i {
      flex: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--ink); color: #fff; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; margin-top: 2px;
    }
    .note b { font-weight: 600; }

    .footer { flex: none; background: #fff; border-top: 1px solid var(--line); }
    .footer-inner {
      display: flex; justify-content: center; align-items: center;
      padding: 14px 24px;
      padding-bottom: calc(16px + max(env(safe-area-inset-bottom), 34px));
    }
    button {
      font-size: 16px; font-weight: 500; padding: 12px 22px; border-radius: 8px;
      border: 1px solid transparent; cursor: pointer; min-height: 46px; min-width: 140px;
      background: var(--primary); color: #fff;
      transition: background .15s;
    }
    button:hover { background: var(--primary-hover); }
  </style>
  <script>
    // Capture Canvas's MessagePort as early as possible so we never miss the
    // INIT_CHANNEL transfer. Canvas requires us to post {type:'CLOSE_MODAL'} back
    // through this port to dismiss the modal.
    window.__consentPort = null;
    window.addEventListener('message', function (event) {
      if (event.ports && event.ports[0]) {
        window.__consentPort = event.ports[0];
        try { window.__consentPort.start(); } catch (e) {}
      }
    });
  </script>
</head>
<body>
  <div class="view">
    <div class="info-body">
      <div class="badge" aria-hidden="true">&#10003;</div>
      <h1>Consent already on file</h1>
      <p class="lead">No action needed. This patient's consent has already been recorded.</p>
      <div class="note">
        <span class="i" aria-hidden="true">i</span>
        <span>The <b>{{ button_title }}</b> button will be removed on the next page reload. To clear it now, refresh the page.</span>
      </div>
    </div>
    <div class="footer">
      <div class="footer-inner">
        <button type="button" id="okBtn">Okay</button>
      </div>
    </div>
  </div>

  <script>
    function closeModal() {
      var p = window.__consentPort;
      if (p) {
        try { p.postMessage({ type: 'CLOSE_MODAL' }); return; } catch (e) {}
      }
      try { window.parent.postMessage({ type: 'CLOSE_MODAL' }, '*'); } catch (e) {}
      try { window.close(); } catch (e) {}
    }
    document.getElementById('okBtn').addEventListener('click', closeModal);
  </script>
</body>
</html>
