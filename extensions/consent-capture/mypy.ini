# Type-checking config for the consent_capture Canvas plugin.
#
# Run from this container directory:
#   uv run --with mypy mypy --config-file=mypy.ini consent_capture
#
# The Canvas SDK (`canvas_sdk.*`) and the plugin-runtime `logger` module ship no
# type stubs, so their imports are ignored rather than reported as missing.

[mypy]
python_version = 3.12
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
exclude = (^|/)(tests|\.venv|__pycache__)/

# This plugin is written without type annotations, so mypy's default (do not
# type-check the bodies of unannotated functions) gives a clean baseline that
# still checks imports, assignments, and any future annotated code. Flip
# `check_untyped_defs = True` if/when the source gains annotations.

[mypy-canvas_sdk.*]
ignore_missing_imports = True

[mypy-logger]
ignore_missing_imports = True
