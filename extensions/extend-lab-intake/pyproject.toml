# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "extend-lab-intake"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "django>=4.2.0",
    "httpx>=0.27.0",
    "boto3>=1.34.0",
    "requests>=2.31.0",
    "canvas>=0.8.0",
    "extend-ai>=0.0.14",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.coverage.run]
omit = ["tests/*"]
