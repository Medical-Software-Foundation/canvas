[project]
name = "prescription-favorites"
version = "0.5.1"
description = "Quick access to commonly prescribed medications through a searchable catalog with multi-select batch prescribing"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Jess Herbert", email = "jessica.herbert@canvasmedical.com" },
]
requires-python = ">=3.12,<3.14"
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils] @ git+https://github.com/canvas-medical/canvas-plugins.git@refs/pull/1336/head",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.coverage.run]
source = ["prescription_favorites"]
omit = ["tests/*"]
