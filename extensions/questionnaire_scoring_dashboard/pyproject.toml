# Local development/testing only. The Canvas plugin packaging process does not use this file.
[project]
name = "questionnaire-scoring-dashboard"
version = "0.1.0"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "django>=4.2.0",
    "canvas[test-utils]",
]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "--cov=questionnaire_scoring_dashboard --cov-report=term-missing"

[tool.coverage.run]
omit = ["tests/*"]

[tool.ruff]
target-version = "py312"
