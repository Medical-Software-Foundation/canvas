<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Card body -->
  <rect x="4" y="10" width="40" height="28" rx="3" ry="3" fill="#2563eb"/>
  <!-- Photo placeholder (left) -->
  <rect x="7" y="14" width="9" height="9" rx="1" ry="1" fill="#bfdbfe"/>
  <!-- Text lines (right of photo) -->
  <rect x="18" y="15" width="21" height="2" rx="1" ry="1" fill="#ffffff"/>
  <rect x="18" y="19" width="17" height="2" rx="1" ry="1" fill="#ffffff"/>
  <rect x="18" y="23" width="13" height="2" rx="1" ry="1" fill="#bfdbfe"/>
  <!-- Magnetic stripe / signature line at the bottom of the card -->
  <rect x="7" y="30" width="34" height="4" rx="0.5" ry="0.5" fill="#1e40af"/>
</svg>
