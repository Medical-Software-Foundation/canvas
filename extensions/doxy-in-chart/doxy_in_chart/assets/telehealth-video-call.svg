<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="46" fill="#E8F4FD" stroke="#2196F3" stroke-width="2"/>
  <!-- Video camera body -->
  <rect x="18" y="32" width="42" height="32" rx="4" ry="4" fill="#2196F3"/>
  <!-- Camera lens indicator -->
  <circle cx="39" cy="48" r="8" fill="#1976D2"/>
  <circle cx="39" cy="48" r="4" fill="#E8F4FD"/>
  <!-- Camera triangle (viewfinder) -->
  <polygon points="62,38 78,28 78,64 62,54" fill="#1976D2"/>
  <!-- Signal waves -->
  <path d="M72,22 Q78,18 84,22" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M68,16 Q78,10 88,16" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Medical cross -->
  <rect x="20" y="66" width="12" height="4" rx="1" fill="#4CAF50"/>
  <rect x="24" y="62" width="4" height="12" rx="1" fill="#4CAF50"/>
</svg>