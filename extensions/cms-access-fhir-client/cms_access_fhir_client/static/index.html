<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS ACCESS Inspector</title>
  <style>{{ styles|safe }}</style>
</head>
<body>
  <div class="wrap" id="app">

    <!-- Unalign modal lives here (rendered by JS) -->
    <div class="modal-overlay" id="modal-overlay"></div>

    <!-- Patient header -->
    <div class="pat-header">
      <div class="pat-left">
        <div class="pat-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 8-8"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div>
          <div class="pat-name" id="pat-name">Patient</div>
          <div class="pat-meta" id="pat-meta"></div>
        </div>
      </div>
    </div>

    <!-- Track enrollment -->
    <div class="panel">
      <div class="slabel">Track alignment</div>
      <div id="track-list"></div>
    </div>

    <!-- Session activity (collapsed Troubleshooting) -->
    <div class="panel">
      <div class="act-head" onclick="toggleActivity()">
        <div class="act-head-left">
          <span class="slabel" style="margin-bottom:0">Session activity</span>
          <span class="cnt" id="act-count">0</span>
        </div>
        <div class="act-right">
          <button class="text-btn" id="clear-btn" style="display:none" onclick="event.stopPropagation();clearLog()">Clear</button>
          <span>Troubleshooting</span>
          <svg id="act-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" style="transition:transform .2s" aria-hidden="true"><path d="M2 4l4 4 4-4" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="act-body" id="act-body"></div>
    </div>

  </div>

  <script>window.ACCESS_PATIENT_ID = "{{ patient_id }}";</script>
  <script>{{ script|safe }}</script>
</body>
</html>
