<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dexcom Connected</title>
<style>
  body {
    margin: 0; padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f7f8fa; color: #1f2933;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .card {
    background: white; border-radius: 8px; padding: 32px 24px;
    box-shadow: 0 2px 8px rgba(15,23,42,0.06);
    max-width: 360px; text-align: center;
  }
  .check {
    width: 56px; height: 56px; border-radius: 28px;
    background: #00853e; color: white; display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 32px; margin-bottom: 16px;
  }
  h1 { margin: 0 0 8px; font-size: 20px; }
  p { margin: 0; color: #5b6873; font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>You're connected</h1>
  <p>Your Dexcom CGM is now connected to your patient chart. You can close this window and return to your care team.</p>
</div>
</body>
</html>
