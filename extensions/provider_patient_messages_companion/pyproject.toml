[project]
authors = [
  {email = "engineering@canvasmedical.com", name = "Canvas Team"}
]
dependencies = [
  "canvas[test-utils]"
]
description = "Provider companion app surfacing live patient-message threads for every patient on the logged-in provider's panel."
license = "MIT"
name = "provider_patient_messages_companion"
readme = "provider_patient_messages_companion/README.md"
requires-python = ">=3.11"
version = "0.0.1"

[tool.pytest.ini_options]
python_files = ["*_tests.py", "test_*.py", "tests.py"]

[dependency-groups]
dev = [
    "pytest-cov>=7.0.0",
]

[tool.coverage.run]
source = ["provider_patient_messages_companion"]
omit = ["tests/*", "*/tests/*"]

[tool.coverage.report]
omit = ["tests/*", "*/tests/*"]
