<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Card shadow -->
  <rect x="13" y="23" width="74" height="66" rx="10" fill="#1e5e57" opacity="0.4"/>

  <!-- Card body -->
  <rect x="11" y="20" width="74" height="66" rx="10" fill="#fafcff"/>

  <!-- Top band (teal accent) with rounded top corners only -->
  <path d="M21 20 L75 20 Q85 20 85 30 L85 42 L11 42 L11 30 Q11 20 21 20 Z" fill="#0d9488"/>

  <!-- Inner highlight for paper-cut feel -->
  <path d="M21 22 L75 22 Q83 22 83 30 L83 32 L13 32 L13 30 Q13 22 21 22 Z" fill="#14b8a6"/>

  <!-- Back bubble (lighter teal, incoming) -->
  <path d="M18 50 Q18 45 23 45 L52 45 Q57 45 57 50 L57 63 Q57 68 52 68 L34 68 L27 74 L27 68 L23 68 Q18 68 18 63 Z"
        fill="#5eead4"/>

  <!-- Front bubble (primary teal, outgoing) -->
  <path d="M40 56 Q40 51 45 51 L75 51 Q80 51 80 56 L80 69 Q80 74 75 74 L62 74 L55 80 L55 74 L45 74 Q40 74 40 69 Z"
        fill="#0d9488"/>

  <!-- Three dots on front bubble -->
  <circle cx="53" cy="62.5" r="2" fill="#fafcff"/>
  <circle cx="60" cy="62.5" r="2" fill="#fafcff"/>
  <circle cx="67" cy="62.5" r="2" fill="#fafcff"/>
</svg>
