<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- white background -->
  <rect width="100" height="100" rx="14" ry="14" fill="#ffffff"/>

  <!-- cloud (Salesforce) on the left -->
  <g fill="#007e8e">
    <circle cx="26" cy="46" r="14"/>
    <circle cx="40" cy="38" r="16"/>
    <circle cx="50" cy="48" r="12"/>
    <rect x="22" y="46" width="32" height="14" rx="7" ry="7"/>
  </g>

  <!-- arrow pointing right -->
  <g fill="#007e8e">
    <rect x="56" y="48" width="10" height="6" rx="1"/>
    <polygon points="64,42 76,51 64,60"/>
  </g>

  <!-- Canvas: rounded square on the right -->
  <rect x="74" y="38" width="22" height="26" rx="4" ry="4"
        fill="none" stroke="#007e8e" stroke-width="4"/>
  <!-- small chart inside Canvas square -->
  <path d="M78 58 L82 53 L86 56 L92 49" stroke="#007e8e"
        stroke-width="2.2" fill="none" stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
