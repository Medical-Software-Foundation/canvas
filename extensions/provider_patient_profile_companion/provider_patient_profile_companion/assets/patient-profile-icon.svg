<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8" in="SourceAlpha"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5" in="SourceAlpha"/>
      <feOffset dx="0" dy="0.6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="portraitClip">
      <rect x="26" y="40" width="22" height="28" rx="2"/>
    </clipPath>
  </defs>

  <!-- Rounded square card background (teal/blue family) -->
  <rect x="8" y="8" width="84" height="84" rx="14" fill="#dbeafe" filter="url(#shadow)"/>
  <rect x="8" y="8" width="84" height="12" rx="14" fill="#bfdbfe"/>
  <rect x="8" y="15" width="84" height="5" fill="#bfdbfe"/>

  <!-- Identity card body -->
  <rect x="18" y="28" width="64" height="48" rx="4" fill="#ffffff" filter="url(#softshadow)"/>
  <rect x="18" y="28" width="64" height="48" rx="4" fill="none" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Card top stripe (header band) -->
  <rect x="18" y="28" width="64" height="6" rx="4" fill="#1d4ed8"/>
  <rect x="18" y="32" width="64" height="2" fill="#1d4ed8"/>

  <!-- Portrait frame -->
  <rect x="26" y="40" width="22" height="28" rx="2" fill="#e0f2fe" stroke="#0e7490" stroke-width="1.2"/>
  <!-- Portrait silhouette inside frame (head + shoulders), clipped to the frame -->
  <g clip-path="url(#portraitClip)">
    <circle cx="37" cy="50" r="5" fill="#0e7490"/>
    <ellipse cx="37" cy="70" rx="11" ry="9" fill="#0e7490"/>
  </g>

  <!-- Data lines beside the portrait -->
  <rect x="54" y="42" width="22" height="3" rx="1.5" fill="#1d4ed8"/>
  <rect x="54" y="49" width="18" height="3" rx="1.5" fill="#60a5fa"/>
  <rect x="54" y="56" width="22" height="3" rx="1.5" fill="#60a5fa"/>
  <rect x="54" y="63" width="14" height="3" rx="1.5" fill="#60a5fa"/>

  <!-- Pencil edit indicator (bottom-right corner) -->
  <g transform="rotate(45 76 80)">
    <rect x="68" y="78.4" width="14" height="3.2" rx="0.5" fill="#f59e0b" stroke="#92400e" stroke-width="0.4"/>
    <rect x="80.8" y="78.4" width="2.4" height="3.2" fill="#fde68a" stroke="#92400e" stroke-width="0.4"/>
    <polygon points="83.2,78.4 85.6,80 83.2,81.6" fill="#1f2937" stroke="#1f2937" stroke-width="0.3"/>
    <rect x="66" y="78.4" width="2" height="3.2" fill="#fca5a5" stroke="#92400e" stroke-width="0.4"/>
  </g>
</svg>
