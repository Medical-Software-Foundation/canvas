# This pyproject.toml is only used for local development and testing.
# The Canvas plugin has its own packaging process that doesn't use this file.

[project]
name = "sticky_note"
version = "0.0.0"
description = "Sticky note action button in patient chart header with shared and user-specific notes"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Kristen O'Neill", email = "kristen.oneill@canvasmedical.com" },
]
requires-python = ">=3.12"
dependencies = [
    "django>=4.2.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-django>=4.7.0",
    "pytest-mock>=3.12.0",
]

[tool.coverage.run]
omit = ["tests/*"]
